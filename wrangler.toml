name = "danmu-api"
main = "cf_worker.js"
compatibility_date = "2024-09-21"

# 静态资源配置 - 工具文件通过 /tools/ 路径访问
[assets]
directory = "./tools"
binding = "ASSETS"

# 基础环境变量（公开配置）
[vars]
ENABLE_ASYMMETRIC_AUTH_ENV = "{{ENABLE_ASYMMETRIC_AUTH_ENV}}"
ENABLE_DETAILED_LOGGING = "{{ENABLE_DETAILED_LOGGING}}"
USER_AGENT_LIMITS_CONFIG = '''{{USER_AGENT_LIMITS_CONFIG}}'''
IP_BLACKLIST_CONFIG = '''{{IP_BLACKLIST_CONFIG}}'''
WORKER_ID = "{{WORKER_ID}}"
PRIVATE_KEY_HEX = "{{PRIVATE_KEY_HEX}}"
OAUTH_CONFIG = '''{{OAUTH_CONFIG}}'''
# 本地端长连接控制 token（本地端连 /control/ws 时校验 X-Control-Token）
CONTROL_TOKEN = "{{CONTROL_TOKEN}}"

#密钥配置 （一般有两个，两个都填会轮换使用，配置成密钥的类型）
# APP_ID
# APP_SECRET
# APP_SECRET_2


# wrangler.toml (wrangler v3.88.0^)
[observability.logs]
enabled = true

# 迁移：删除Durable Objects类
[[migrations]]
tag = "v6"
deleted_classes = ["RateLimiter", "AppState"]

# 迁移：新增 ControlHub 长连接控制中心（本地端 WebSocket 汇聚点）
# 免费计划仅支持 SQLite 后端的 Durable Object，故用 new_sqlite_classes；
# ControlHub 仅用 WebSocket + 内存状态，不使用 storage，SQLite 后端零成本。
[[migrations]]
tag = "v7-control-hub"
new_sqlite_classes = ["ControlHub"]

# Durable Object 绑定：ControlHub
[[durable_objects.bindings]]
name = "CONTROL_HUB"
class_name = "ControlHub"

# R2 弹幕缓存（/api/v2/comment/ 响应缓存，12小时过期）
[[r2_buckets]]
binding = "DANMAKU_CACHE"
bucket_name = "danmu-api-cache"

# Cron 定时触发：每30分钟清理一次 R2 弹幕缓存（过期清理 + 9GB阈值清理）
[triggers]
crontab = ["*/30 * * * *"]


