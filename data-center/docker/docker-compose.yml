version: '3.8'

services:
  data-center:
    image: l429609201/dd-danmaku:latest
    container_name: danmu-data-center
    ports:
      - "7759:7759"      # Web界面和API端口
    environment:
      # 基础配置
      - DATABASE_TYPE=sqlite
      - SQLITE_PATH=/app/config/database.db
      - CONFIG_PATH=/app/config
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/config/logs/app.log

      # 服务配置
      - HOST=0.0.0.0
      - PORT=7759
      - TZ=Asia/Shanghai

      # 文件权限（挂载卷的属主，按宿主机用户调整）
      - PUID=1000
      - PGID=1000
      - UMASK=0022

      # 管理员用户配置（首次启动建库时生效）
      # ADMIN_PASSWORD 不填则自动生成 12 位随机密码并打印在启动日志里
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change-me-admin-password

      # 安全密钥（JWT 签名，生产务必改成随机长字符串）
      - SECRET_KEY=change-me-to-a-long-random-secret

      # Redis 热缓存（新架构：响应体走 Redis，元数据走 SQL）
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PREFIX=dd_danmaku
      - CACHE_BODY_STORAGE=redis

      # 缓存策略（可选，默认刷新间隔 6h / 兜底保留 30 天）
      - CACHE_REFRESH_INTERVAL_SECONDS=21600
      - CACHE_STALE_MAX_AGE_SECONDS=2592000

      # Worker 长连接控制（本地端主动连 Worker ControlHub）
      # ⚠️ 下面两项替换成你的实际值；CONTROL_TOKEN 必须与 wrangler CONTROL_TOKEN 完全一致，否则 Worker 返回 401
      - CONTROL_WORKER_WS_URL=wss://your-worker-domain/control/ws
      - CONTROL_TOKEN=与-Worker-CONTROL_TOKEN-保持一致
      - CONTROL_NODE_ID=local-node-1

      # 可选：MySQL配置（如果使用MySQL，取消注释）
      # - DATABASE_TYPE=mysql
      # - MYSQL_HOST=mysql
      # - MYSQL_PORT=3306
      # - MYSQL_USER=root
      # - MYSQL_PASSWORD=your_mysql_password
      # - MYSQL_DATABASE=danmu_data_center

      # 可选：PostgreSQL配置（如果使用PostgreSQL，取消注释）
      # - DATABASE_TYPE=postgresql
      # - POSTGRES_HOST=postgres
      # - POSTGRES_PORT=5432
      # - POSTGRES_USER=postgres
      # - POSTGRES_PASSWORD=your_postgres_password
      # - POSTGRES_DATABASE=danmu_data_center
      
    volumes:
      # 配置和数据持久化
      - ./config:/app/config

    depends_on:
      - redis

    networks:
      - danmu-network

    restart: unless-stopped

    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis 热缓存服务（新架构：响应体/热数据走 Redis）
  redis:
    image: redis:7-alpine
    container_name: danmu-redis
    command: redis-server --appendonly yes
    volumes:
      - ./config/redis:/data
    restart: unless-stopped
    networks:
      - danmu-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # 可选：MySQL数据库服务（如果使用MySQL，取消注释）
  # mysql:
  #   image: mysql:8.0
  #   container_name: danmu-mysql
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=your_mysql_password
  #     - MYSQL_DATABASE=danmu_data_center
  #     - MYSQL_USER=danmu_user
  #     - MYSQL_PASSWORD=your_mysql_password
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   restart: unless-stopped
  #   networks:
  #     - danmu-network

  # 可选：PostgreSQL数据库服务（如果使用PostgreSQL，取消注释）
  # postgres:
  #   image: postgres:15
  #   container_name: danmu-postgres
  #   environment:
  #     - POSTGRES_DB=danmu_data_center
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=your_postgres_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped
  #   networks:
  #     - danmu-network

volumes:
  # mysql_data:
  # postgres_data:

networks:
  danmu-network:
    driver: bridge
